{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Stack Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
<div class="container">

    <img src="/media/posts/logo_nova.png"
     alt="Full-Stack Fitness"
     class="logo_navbar"
     >

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav me-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

{% for categoria in categorias_menu %}
<li class="nav-item">
    <a class="nav-link" href="{% url 'posts_categoria' categoria.slug %}">
        {{ categoria.nome }}
    </a>
</li>
{% endfor %}

<li class="nav-item">
<a class="nav-link" href="{% url 'sobre' %}">Sobre</a>
</li>

</ul>

<form class="d-flex" method="get" action="/">
<input class="form-control me-2"
type="search"
placeholder="Buscar posts..."
name="q">

<button class="btn btn-outline-light" type="submit">
Buscar
</button>

</form>

</div>
</div>
</nav>
    {% block hero %}
    <div class="hero-blog">
        
    <img src="/media/posts/novo_banner.png"
         class="hero-img hero-desktop"
         alt="Banner Desktop">


    <img src="/media/posts/banner_mobile.png" 
        class="hero-img hero-mobile" 
        alt="banner_mobile">



    </div>
    {% endblock %}
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>

<footer class="footer">
    <div class="container text-center">

        <h5>Full-Stack Fitness</h5>

        <p>
            Código Forte. Corpo Forte. Mente Forte.
        </p>

        <small>
            © 2026 Full-Stack Fitness
        </small>

    </div>
</footer>
</body>
</html>
