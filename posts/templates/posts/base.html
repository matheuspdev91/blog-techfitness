{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEV FIT LAB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
<div class="container">

<a class="navbar-brand fw-bold" href="/">
DevFit Lab
</a>

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav me-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Tech</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Fitness</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">IA</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Sobre</a>
</li>

</ul>

<form class="d-flex" method="get" action="/">
<input class="form-control me-2"
type="search"
placeholder="Buscar posts..."
name="q">

<button class="btn btn-outline-light" type="submit">
Buscar
</button>

</form>

</div>
</div>
</nav>
    {% block hero %}
    <div class="hero-blog">
        <img src="/media/posts/Tecnologia_e_fitness_em_harmonia.png" class="hero-img" alt="Tecnologia e Fitness">

        <div class="hero-text">
            <h1>Techno Fit</h1>
            <p>Tecnologia e Fitness em harmonia</p>
        </div>

    </div>
    {% endblock %}
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
</body>
</html>
