{% extends 'posts/base.html' %}
{% load blog_extras %}

{% block content %}

<div class="container mt-5">
<h1>{{ post.titulo }}</h1>
<p class="text-muted">
Publicado em {{ post.criado_em|date:"d M Y" }}
{{ post.conteudo|tempo_leitura }} 
</p>

<hr>

<p>{{ post.conteudo }}</p>
<a href="/" class="btn btn-secondary mt-3">
Voltar
</a>

</div> 

{% endblock %}
